<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MicroTaskX Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify-darklight-theme/dist/docsify-themeable/style.min.css"
    />
  </head>
  <body>
    <div id="app">Loading MicroTaskX Documentation...</div>

    <script>
      window.$docsify = {
        name: "MicroTaskX",
        repo: "https://github.com/Moaaz-i/MicroTaskX",
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        search: {
          maxAge: 86400000,
          placeholder: "Search MicroTaskX...",
          noData: "No results found",
        },
        darklightTheme: {
          defaultTheme: "dark",
          dark: {
            accent: "#3b82f6",
          },
          light: {
            accent: "#3b82f6",
          },
        },
      };
    </script>

    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
